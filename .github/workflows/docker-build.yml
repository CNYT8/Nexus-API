name: Publish Nexus-API Docker image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag, for example latest or v1.0.0'
        required: true
        type: string

concurrency:
  group: docker-${{ github.event.inputs.image_tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check version sync
        run: bash bin/check-version-sync.sh "${{ github.event.inputs.image_tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/cnyt8/nexus-api:${{ github.event.inputs.image_tag }}
            ghcr.io/cnyt8/nexus-api:latest
          labels: |
            org.opencontainers.image.title=Nexus-API
            org.opencontainers.image.description=An AGPLv3 downstream project based on new-api.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Image summary
        run: |
          echo "### Nexus-API Docker image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/cnyt8/nexus-api:${{ github.event.inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/cnyt8/nexus-api:latest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Prune old GHCR image versions
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_OWNER: CNYT8
          PACKAGE_NAME: nexus-api
        run: |
          set -euo pipefail

          versions_file="$(mktemp)"
          gh api "/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}/versions?per_page=100" --paginate --slurp > "$versions_file"

          keep_id="$(jq -r '[.[][]?] | sort_by(.created_at) | reverse | .[0].id // empty' "$versions_file")"
          if [ -z "$keep_id" ]; then
            echo "No GHCR package versions found."
            exit 0
          fi

          keep_summary="$(jq -r --argjson keep_id "$keep_id" '[.[][]?] | map(select(.id == $keep_id)) | .[0] | "Keeping version \(.id), created at \(.created_at), tags: \((.metadata.container.tags // []) | join(", "))"' "$versions_file")"
          echo "$keep_summary"

          delete_ids="$(jq -r --argjson keep_id "$keep_id" '[.[][]?] | sort_by(.created_at) | reverse | .[1:][] | .id' "$versions_file")"
          if [ -z "$delete_ids" ]; then
            echo "No old GHCR package versions to delete."
            exit 0
          fi

          while IFS= read -r version_id; do
            [ -n "$version_id" ] || continue
            echo "Deleting old GHCR package version ${version_id}"
            gh api --method DELETE "/users/${PACKAGE_OWNER}/packages/container/${PACKAGE_NAME}/versions/${version_id}"
          done <<< "$delete_ids"
