name: Publish Nexus-API Docker image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag, for example latest or v1.0.0'
        required: true
        type: string

concurrency:
  group: docker-${{ github.event.inputs.image_tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/cnyt8/nexus-api:${{ github.event.inputs.image_tag }}
            ghcr.io/cnyt8/nexus-api:latest
          labels: |
            org.opencontainers.image.title=Nexus-API
            org.opencontainers.image.description=An AGPLv3 downstream project based on new-api.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Image summary
        run: |
          echo "### Nexus-API Docker image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/cnyt8/nexus-api:${{ github.event.inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/cnyt8/nexus-api:latest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
