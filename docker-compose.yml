version: '3.8'

services:
  nexus-api:
    build: .
    container_name: nexus-api
    ports:
      - "3000:3000"
    environment:
      - SQL_DSN=root:123456@tcp(db:3306)/newapi?parseTime=true
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./web/dist:/app/web/dist
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: mysql:8.0
    container_name: nexus-db
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=newapi
    volumes:
      - nexus-mysql-data:/var/lib/mysql
    restart: always

  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: always

volumes:
  nexus-mysql-data:
